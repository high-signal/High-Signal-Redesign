kind = "web"
previewPath = "/"
title = "High Signal Landing Page"
version = "1.0.0"
id = "artifacts/high-signal-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23779
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/high-signal-landing run dev"

[services.env]
PORT = "23779"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/high-signal-landing", "run", "build"]
publicDir = "artifacts/high-signal-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
