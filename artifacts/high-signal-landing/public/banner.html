<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap');

  html, body {
    width: 1800px;
    height: 600px;
    overflow: hidden;
    background: #070D1A;
  }

  .canvas {
    width: 1800px;
    height: 600px;
    background: #070D1A;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Ambient glow */
  .glow {
    position: absolute;
    width: 900px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(6,182,212,0.07) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* SVG node lines */
  svg.nodes {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.18;
    pointer-events: none;
  }

  .text-block {
    position: relative;
    z-index: 10;
    text-align: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.05;
  }

  .line1 {
    display: block;
    font-size: 130px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: -3px;
  }

  .line2 {
    display: block;
    font-size: 130px;
    font-weight: 900;
    letter-spacing: -3px;
    background: linear-gradient(90deg, #22D3EE 0%, #38BDF8 55%, #60A5FA 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="glow"></div>

  <svg class="nodes" xmlns="http://www.w3.org/2000/svg">
    <path d="M 240 360 Q 480 240 720 480 T 1200 360" fill="none" stroke="#06B6D4" stroke-width="1.2" stroke-dasharray="5 5"/>
    <path d="M 120 540 Q 360 640 600 480 T 1080 540" fill="none" stroke="#06B6D4" stroke-width="1" stroke-dasharray="5 5" opacity="0.6"/>
    <path d="M 1400 100 Q 1550 200 1680 120 T 1800 180" fill="none" stroke="#06B6D4" stroke-width="1" stroke-dasharray="5 5" opacity="0.5"/>
    <path d="M 60 180 Q 180 120 300 200" fill="none" stroke="#06B6D4" stroke-width="1" stroke-dasharray="5 5" opacity="0.4"/>
    <circle cx="240" cy="360" r="5" fill="#06B6D4"/>
    <circle cx="720" cy="480" r="7" fill="#06B6D4"/>
    <circle cx="1200" cy="360" r="5" fill="#06B6D4"/>
    <circle cx="600" cy="480" r="6" fill="#06B6D4"/>
    <circle cx="1400" cy="100" r="4" fill="#06B6D4"/>
    <circle cx="1680" cy="120" r="4" fill="#06B6D4"/>
  </svg>

  <div class="text-block">
    <span class="line1">Find the voices</span>
    <span class="line2">that matter</span>
  </div>
</div>
</body>
</html>
